fastrack_tracker:
  ros__parameters:
    min_lookahead: 0.05
    max_lookahead: 0.5

hybrid_tracking_controller:
  ros__parameters:
    min_v: 0.0          # m/s
    min_v_hat: 0.0      # m/s
    max_v: 0.5          # m/s
    max_v_hat: 0.5      # m/s
    max_omega: 1.5      # rad/s
    max_omega_hat: 1.5  # rad/s
    max_a: 0.5          # n/s^2
    max_alpha: 0.5      # rad/s^2
    dt: 0.01
    safety_threshold: 0.05  # tracking error bound for switching

planner_server:
  ros__parameters:
    path_length: 5.0
    goal_x: 1.0
    goal_y: -0.5
